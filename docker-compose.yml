services:

  # Application
  cpp:
    build: ./templates/cpp
    volumes:
      - ${PROJECT_PATH}:/app
    stdin_open: true
    tty: true

  java:
    build: ./templates/java
    volumes:
      - ${PROJECT_PATH}:/app
    stdin_open: true
    tty: true

  python:
    build: ./templates/python
    volumes:
      - ${PROJECT_PATH}:/app
    stdin_open: true
    tty: true

  # Website
  django:
    build: ./templates/django
    ports:
      - "8000:8000"
    volumes:
      - ${PROJECT_PATH}:/app
    stdin_open: true
    tty: true

  nginx:
    build: ./templates/html/nginx
    ports:
      - "8080:80"
    volumes:
      - ${PROJECT_PATH}:/app
    stdin_open: true
    tty: true

  apache:
    build: ./templates/html/apache
    ports:
      - "8080:80"
    volumes:
      - ${PROJECT_PATH}:/app
    stdin_open: true
    tty: true

  # Scripting
  bash:
    build: ./templates/bash
    volumes:
      - ${PROJECT_PATH}:/app
    stdin_open: true
    tty: true

  json:
    build: ./templates/python
    volumes:
      - ${PROJECT_PATH}:/app
    stdin_open: true
    tty: true

  xml:
    build: ./templates/python
    volumes:
      - ${PROJECT_PATH}:/app
    stdin_open: true
    tty: true
